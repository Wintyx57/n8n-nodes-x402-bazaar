<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAA22"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="60" height="60" rx="12" ry="12" fill="url(#bg)"/>
  <!-- Subtle orange border -->
  <rect x="1" y="1" width="58" height="58" rx="11" ry="11" fill="none" stroke="#FF9900" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- "x4" text - bold, centered, readable at small size -->
  <text x="30" y="41" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="32" fill="url(#accent)" text-anchor="middle" letter-spacing="-1">x4</text>
</svg>
